# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
# FAST TEST CONFIG: RebatePaid handler testing
# Targets specific blocks with known RebatePaid events
# Sync time: ~30 seconds instead of hours

name: thj-indexer-test-rebate
contracts:
  # Only include SFMultiRewards for rebate testing
  - name: SFMultiRewards
    handler: src/EventHandlers.ts
    events:
      - event: RebatePaid(address indexed user, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      # Include RewardPaid for comparison
      - event: RewardPaid(address indexed user, address indexed rewardsToken, uint256 reward)
        field_selection:
          transaction_fields:
            - hash

networks:
  - id: 80094
    # Block range containing known RebatePaid events
    # First RebatePaid: block 15,739,176
    start_block: 15739170
    end_block: 15739180  # Just 10 blocks = very fast sync
    contracts:
      - name: SFMultiRewards
        address:
          - 0x34b3668e2AD47ccFe3C53e24a0606B911D1f6a8f # HLKD1B MultiRewards

unordered_multichain_mode: false
preload_handlers: true
rollback_on_reorg: false  # Faster dev mode
