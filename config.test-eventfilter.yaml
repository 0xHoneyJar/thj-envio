# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
# FAST TEST CONFIG: eventFilter verification for validator contracts
# Tests that bytes indexed eventFilters correctly match tracked validator pubkeys
# Sync time: ~30 seconds
#
# What to verify after sync:
# 1. LatestValidatorReward records exist (should have entries for tracked validators)
# 2. LatestValidatorDeposit records exist
# 3. ValidatorBlockRewards count > 0 (proves eventFilters matched)

name: thj-indexer-test-eventfilter
contracts:
  - name: BlockRewardController
    handler: src/EventHandlers.ts
    events:
      - event: BlockRewardProcessed(bytes indexed pubkey, uint64 nextTimestamp, uint256 baseRate, uint256 rewardRate)
        field_selection:
          transaction_fields:
            - hash
  - name: BeaconDeposit
    handler: src/EventHandlers.ts
    events:
      - event: Deposit(bytes pubkey, bytes credentials, uint64 amount, bytes signature, uint64 index)
        field_selection:
          transaction_fields:
            - hash
  - name: FatBeraDeposits
    handler: src/EventHandlers.ts
    events:
      - event: Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)
        field_selection:
          transaction_fields:
            - hash
            - from
            - to
  - name: FatBeraAccounting
    handler: src/EventHandlers.ts
    events:
      - event: RewardAdded(address indexed token, uint256 rewardAmount)
        field_selection:
          transaction_fields:
            - hash
      - event: WithdrawalRequested(address indexed user, uint256 indexed batchId, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
      - event: BatchStarted(uint256 indexed batchId, uint256 totalAmount)
        field_selection:
          transaction_fields:
            - hash
      - event: WithdrawalFulfilled(address indexed user, uint256 indexed batchId, uint256 amount)
        field_selection:
          transaction_fields:
            - hash
  - name: AutomatedStake
    handler: src/EventHandlers.ts
    events:
      - event: WithdrawUnwrapAndStakeExecuted(uint256 indexed amount, uint256 indexed validatorIndex, bytes indexed pubkey)
        field_selection:
          transaction_fields:
            - hash
  - name: ValidatorWithdrawalModule
    handler: src/EventHandlers.ts
    events:
      - event: ValidatorWithdrawalRequested(address indexed safe, address indexed initiator, bytes indexed cometBFTPublicKey, uint256 withdrawAmount, uint256 fee)
        field_selection:
          transaction_fields:
            - hash
  - name: ValidatorDepositRouter
    handler: src/EventHandlers.ts
    events:
      - event: ValidatorDepositRequested(address indexed depositor, address indexed receiver, uint256 amount, uint256 indexed validatorIndex)
        field_selection:
          transaction_fields:
            - hash

